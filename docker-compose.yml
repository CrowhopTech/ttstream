version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - redis-network
    volumes:
      - redis_data:/data

  icecast:
    image: libretime/icecast
    container_name: icecast
    restart: unless-stopped
    ports:
      - "8069:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: magicalpasswordofawesome
      ICECAST_ADMIN_PASSWORD: magicalpasswordofawesome
      ICECAST_PASSWORD: magicalpasswordofawesome
      ICECAST_HOSTNAME: "192.168.128.30" # TODO: get this dynamically?
      ICECAST_MAX_CLIENTS: "100"
      ICECAST_MAX_SOURCES: "5"

  webpage:
    image: nginx:1.31.2-alpine
    ports:
      - "5000:80"
    environment: []
    volumes:
      - ./static_web_content/index.html:/usr/share/nginx/html/index.html:ro
